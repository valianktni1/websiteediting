services:
  mongo:
    image: mongo:7
    container_name: we-mongo
    restart: unless-stopped
    command:
      - --quiet
    volumes:
      - /mnt/apps/website_editor/mongo:/data/db
    networks:
      - we-network

  backend:
    build:
      context: https://github.com/valianktni1/websiteediting.git#main:backend
    container_name: we-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: website_editor
      CORS_ORIGINS: "*"
      JWT_SECRET: 32a83da10c408286326577ea6072a1b6268c474e6df3d7ae25de219df48ec23a
      SUPERADMIN_EMAIL: mark@perfectweddingsbymark.uk
      SUPERADMIN_PASSWORD: ChangeThis!2026
      SUPERADMIN_NAME: Superadmin
      COOKIE_SECURE: "false"
      SITES_DIR: /data/sites
      DATA_DIR: /data/app
      BACKUP_DIR: /data/backups
    volumes:
      # Drop each built site into its own subfolder here, e.g. /mnt/apps/website_editor/sites/wifetobe
      - /mnt/apps/website_editor/sites:/data/sites
      # Uploaded media + generated dist live here
      - /mnt/apps/website_editor/data:/data/app
      # Per-publish site backups (zips) land here
      - /mnt/photographers_data/website_editor_backup/site_backups:/data/backups
    networks:
      - we-network

  frontend:
    build:
      context: https://github.com/valianktni1/websiteediting.git#main:frontend
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: we-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - 30042:80
    networks:
      - we-network

  backup:
    image: mongo:7
    container_name: we-backup
    restart: unless-stopped
    depends_on:
      - mongo
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          mongodump --uri="mongodb://mongo:27017" --db=website_editor --gzip --archive=/backup/website_editor-$(date +%Y%m%d-%H%M%S).gz;
          find /backup -name 'website_editor-*.gz' -mtime +30 -delete;
          sleep 86400;
        done
    volumes:
      - /mnt/photographers_data/website_editor_backup/db_backups:/backup
    networks:
      - we-network

networks:
  we-network:
    driver: bridge
